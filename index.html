<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stickfighter</title>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #16171d;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash-title {
      color: #f3f4f6;
      font-size: 28px;
      font-weight: 700;
      font-family: system-ui, sans-serif;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }

    #loading-bar-track {
      width: 200px;
      height: 4px;
      background: #2e303a;
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #3182F6;
      border-radius: 2px;
      animation: loading 1.8s ease-in-out infinite;
    }

    @keyframes loading {
      0% {
        width: 0%;
        margin-left: 0%;
      }

      50% {
        width: 60%;
        margin-left: 20%;
      }

      100% {
        width: 0%;
        margin-left: 100%;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-Bbw23GNd.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-GPiiyy07.css">
</head>

<body>
  <div id="splash">
    <div id="splash-title">오락실</div>
    <div id="loading-bar-track">
      <div id="loading-bar-fill"></div>
    </div>
  </div>
  <div id="root"></div>
</body>

</html>
