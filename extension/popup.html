<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>미디어 이관 도우미</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e2e8f0;
      width: 440px;
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e2230;
    }
    .header-title { font-size: 15px; font-weight: 700; flex: 1; }
    .btn-sm {
      background: none;
      border: 1px solid #2e3550;
      color: #64748b;
      border-radius: 6px;
      padding: 3px 9px;
      cursor: pointer;
      font-size: 11px;
    }
    .btn-sm:hover { border-color: #ef4444; color: #ef4444; }

    /* ── 설정 ── */
    details { border-bottom: 1px solid #1e2230; }
    summary {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px; cursor: pointer;
      font-weight: 600; color: #94a3b8; font-size: 12px;
      user-select: none; list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: '▶'; font-size: 9px;
      transition: transform .2s; display: inline-block;
    }
    details[open] summary::before { transform: rotate(90deg); }
    summary:hover { color: #e2e8f0; }

    .settings-body {
      padding: 4px 16px 14px;
      display: flex; flex-direction: column; gap: 9px;
    }
    .sec-label {
      font-size: 11px; font-weight: 700; color: #3b82f6;
      letter-spacing: .05em; text-transform: uppercase; padding-top: 6px;
    }
    label { display: flex; flex-direction: column; gap: 3px; color: #94a3b8; font-size: 12px; }
    label span { color: #cbd5e1; }
    label small { color: #475569; }
    input {
      background: #1e2230; border: 1px solid #2e3550; border-radius: 6px;
      color: #e2e8f0; font-size: 12px; padding: 6px 10px; outline: none; width: 100%;
    }
    input::placeholder { color: #334155; }
    input:focus { border-color: #3b82f6; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .save-btn {
      background: #1d4ed8; border: none; border-radius: 6px;
      color: #fff; font-size: 12px; font-weight: 600; padding: 7px;
      cursor: pointer; margin-top: 2px;
    }
    .save-btn:hover { background: #2563eb; }
    .toast { font-size: 11px; color: #22c55e; height: 14px; text-align: center; }

    /* ── 단계 카드 ── */
    .phase {
      padding: 12px 16px;
      border-bottom: 1px solid #1e2230;
    }
    .phase-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .phase-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: #1e2230; border: 1px solid #2e3550;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #64748b; flex-shrink: 0;
    }
    .phase-num.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
    .phase-num.done   { background: #15803d; border-color: #22c55e; color: #fff; }
    .phase-title { font-size: 13px; font-weight: 600; flex: 1; }
    .phase-status { font-size: 11px; color: #64748b; }

    .action-btn {
      width: 100%; padding: 9px; border: none; border-radius: 7px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .action-btn:disabled { background: #1e2230; color: #374151; cursor: not-allowed; }
    .btn-blue   { background: #1d4ed8; color: #fff; }
    .btn-blue:hover:not(:disabled)  { background: #2563eb; }
    .btn-green  { background: #15803d; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #16a34a; }
    .btn-red    { background: #b91c1c; color: #fff; }
    .btn-red:hover { background: #991b1b; }

    /* 수집 진행바 */
    .collect-info {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: #64748b; margin-top: 6px;
    }
    .mini-bar-track {
      flex: 1; height: 3px; background: #1e2230; border-radius: 2px; overflow: hidden;
    }
    .mini-bar-fill {
      height: 100%; background: #3b82f6; border-radius: 2px;
      transition: width .3s ease; width: 0%;
    }

    /* ── 이관 진행 ── */
    .progress-stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px;
    }
    .stat {
      background: #1e2230; border-radius: 6px; padding: 7px 4px; text-align: center;
    }
    .stat-num { font-size: 17px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 10px; color: #64748b; margin-top: 2px; }
    .s-total .stat-num { color: #94a3b8; }
    .s-done  .stat-num { color: #22c55e; }
    .s-skip  .stat-num { color: #f59e0b; }
    .s-fail  .stat-num { color: #ef4444; }

    .bar-track {
      height: 4px; background: #1e2230; border-radius: 2px; overflow: hidden; margin-bottom: 8px;
    }
    .bar-fill {
      height: 100%; background: #3b82f6; border-radius: 2px;
      transition: width .3s ease; width: 0%;
    }

    /* 로그 */
    .log-hdr {
      font-size: 11px; font-weight: 600; color: #475569;
      display: flex; justify-content: space-between; margin-bottom: 4px;
    }
    .log-box {
      background: #0a0d14; border: 1px solid #1e2230; border-radius: 6px;
      height: 148px; overflow-y: auto; padding: 6px 8px;
      font-family: 'Consolas', monospace; font-size: 11px;
    }
    .le { display: flex; gap: 5px; padding: 2px 0; border-bottom: 1px solid #0f1117; }
    .le:last-child { border-bottom: none; }
    .le-icon { flex-shrink: 0; width: 12px; }
    .le-id   { color: #60a5fa; flex-shrink: 0; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .le-msg  { color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .le.success .le-icon { color: #22c55e; }
    .le.skipped .le-icon { color: #f59e0b; }
    .le.failed  .le-icon { color: #ef4444; }

    .footer { height: 10px; }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<div class="header">
  <div class="header-title">🎬 미디어 이관 도우미</div>
  <button class="btn-sm" id="clear-btn">전체 초기화</button>
</div>

<!-- ── 설정 ── -->
<details id="settings-panel">
  <summary>설정</summary>
  <div class="settings-body">

    <div class="sec-label">NCP 콘솔 소스 설정</div>
    <label>
      <span>목록 API URL <small>(Network 탭에서 확인)</small></span>
      <input id="listApiUrl" placeholder="예: https://console.ncloud.com/api/vod/v1/contents" />
    </label>
    <div class="row3">
      <label><span>페이지 파라미터</span><input id="pageParam" value="page" /></label>
      <label><span>사이즈 파라미터</span><input id="sizeParam" value="size" /></label>
      <label><span>페이지 사이즈</span><input id="pageSize" value="20" /></label>
    </div>
    <div class="row2">
      <label><span>시작 페이지 번호</span><input id="startPage" value="0" /></label>
      <label><span>전체 페이지 JSON 경로</span><input id="totalPagesPath" value="totalPages" /></label>
    </div>
    <div class="row2">
      <label><span>항목 배열 JSON 경로</span><input id="contentPath" value="content" /></label>
      <label><span>ID 필드명</span><input id="idField" value="vodFileId" /></label>
    </div>
    <div class="row3">
      <label><span>CDN URL 필드</span><input id="cdnUrlField" value="cdnUrl" /></label>
      <label><span>파일명 필드</span><input id="fileNameField" value="fileName" /></label>
      <label><span>파일 크기 필드</span><input id="fileSizeField" value="fileSize" /></label>
    </div>

    <div class="sec-label">목적지 설정</div>
    <label>
      <span>업로드 API URL</span>
      <input id="destinationUrl" placeholder="https://your-api.com/v1/media/upload" />
    </label>
    <label>
      <span>Bearer 토큰</span>
      <input id="bearerToken" type="password" placeholder="eyJhbGci..." />
    </label>
    <div class="row2">
      <label><span>multipart 필드명</span><input id="fieldName" value="file" /></label>
      <label><span>추가 ID 필드 (선택)</span><input id="extraIdField" placeholder="없으면 비워두기" /></label>
    </div>

    <button class="save-btn" id="save-btn">설정 저장</button>
    <div class="toast" id="save-toast"></div>
  </div>
</details>

<!-- ── Phase 1: 수집 ── -->
<div class="phase" id="phase1">
  <div class="phase-header">
    <div class="phase-num" id="p1-num">1</div>
    <div class="phase-title">URL 수집</div>
    <div class="phase-status" id="p1-status">NCP 콘솔 페이지에서 실행</div>
  </div>
  <button class="action-btn btn-blue" id="collect-btn">수집 시작</button>
  <div class="collect-info" id="collect-info" hidden>
    <span id="collect-text">0 / ? 페이지</span>
    <div class="mini-bar-track"><div class="mini-bar-fill" id="collect-bar"></div></div>
    <span id="collect-count">0개</span>
  </div>
</div>

<!-- ── Phase 2: 이관 ── -->
<div class="phase" id="phase2">
  <div class="phase-header">
    <div class="phase-num" id="p2-num">2</div>
    <div class="phase-title">이관</div>
    <div class="phase-status" id="p2-status">수집 후 시작 가능</div>
  </div>
  <button class="action-btn btn-green" id="migrate-btn" disabled>이관 시작</button>

  <div id="mig-progress" hidden style="margin-top:10px">
    <div class="progress-stats">
      <div class="stat s-total"><div class="stat-num" id="s-total">0</div><div class="stat-label">전체</div></div>
      <div class="stat s-done"> <div class="stat-num" id="s-done">0</div> <div class="stat-label">완료</div></div>
      <div class="stat s-skip"> <div class="stat-num" id="s-skip">0</div> <div class="stat-label">스킵</div></div>
      <div class="stat s-fail"> <div class="stat-num" id="s-fail">0</div> <div class="stat-label">실패</div></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="mig-bar"></div></div>
    <div class="log-hdr"><span>처리 로그</span><span id="log-cur"></span></div>
    <div class="log-box" id="log-box"></div>
  </div>
</div>

<div class="footer"></div>
<script src="popup.js"></script>
</body>
</html>
